<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.1/dist/aframe-master.min.js"></script>
</head>
<body>
    <a-scene>
        <a-plane rotation="-90 0 0" width="15" height="15" color="#34495e"></a-plane>

        <a-entity id="puente-grua" position="0 0 -6">
            
            <a-cylinder position="-3 2 0" radius="0.3" height="4" color="#f1c40f"></a-cylinder>
            <a-cylinder position="3 2 0" radius="0.3" height="4" color="#f1c40f"></a-cylinder>

            <a-box position="0 4.1 0" width="6.6" height="0.4" depth="0.5" color="#e67e22"></a-box>

            <a-entity id="carro-pendulo" position="1 4.1 0.3">
                <a-box position="0 0 0" width="0.8" height="0.5" depth="0.6" color="#2980b9"></a-box>
                
                <a-cylinder position="0 -1.5 0" radius="0.05" height="3" color="#7f8c8d"></a-cylinder>
                
                <a-sphere position="0 -3 0" radius="0.4" color="#e74c3c"></a-sphere>
            </a-entity>
            
        </a-entity>

        <a-sky color="#ecf0f1"></a-sky>
    </a-scene>
</body>
</html>
